name: Sync Jodoo Data

on:
  schedule:
    - cron: '0 6 * * *'  # Run daily at 6:00 UTC (13:00 Vietnam time)
  workflow_dispatch: {}   # Manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch all products from Jodoo
        run: bash sync.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json"
          else
            COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data.json','utf8')).length)")
            git commit -m "sync: update data.json ($COUNT products)"
            git push
          fi
